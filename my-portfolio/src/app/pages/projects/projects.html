<div class="projects-container">
  <section class="projects-header">
    <h1 class="page-title">Mes <span>Projets</span></h1>
    <p class="page-subtitle">
      Une sélection de mes réalisations en développement Full Stack et DevOps
    </p>
  </section>

  <div class="filter-section">
    <button
      *ngFor="let category of categories"
      class="filter-btn"
      [class.active]="selectedCategory === category.id"
      (click)="selectCategory(category.id)">
      {{ category.label }}
    </button>
  </div>

  <div class="projects-grid">
    <div
      class="project-card"
      *ngFor="let project of filteredProjects"
      (click)="openProjectModal(project)">

      <div class="project-image">
        <div class="project-icon" [innerHTML]="getProjectIcon(project.category)"></div>
      </div>

      <div class="project-content">
        <h3 class="project-title">{{ project.title }}</h3>
        <p class="project-description">{{ project.description }}</p>

        <div class="project-tech">
          <span class="tech-tag" *ngFor="let tech of project.technologies.slice(0, 4)">{{ tech }}</span>
          <span class="tech-tag more-tech" *ngIf="project.technologies.length > 4">
            +{{ project.technologies.length - 4 }}
          </span>
        </div>

        <div class="project-actions">
          <button class="view-details-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <span>Voir les détails</span>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
              <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <app-project-modal
    [project]="selectedProject"
    [isOpen]="isModalOpen"
    (close)="closeModal()">
  </app-project-modal>
</div>
